version: "3.8"
services:
  filebrowser:
    image: filebrowser/filebrowser:latest-s6
    container_name: filebrowser
    environment:
      PUID: 1000
      PGID: 1000
    ports:
      - "8070:80"
    volumes:
      - ./data:/srv
      - ./database:/database
      - ./config:/config
    restart: unless-stopped
