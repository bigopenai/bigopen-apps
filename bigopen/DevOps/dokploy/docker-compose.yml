services:
  dokploy:
    image: dokploy/dokploy:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "3004:3000"
    environment:
      NODE_ENV: production
      APP_URL: ${DOKPLOY_APP_URL:-http://localhost:3004}
      DATABASE_URL: postgres://dokploy:${DOKPLOY_DB_PASSWORD:-change-this-dokploy-db-password}@postgres:5432/dokploy
      REDIS_URL: redis://:${DOKPLOY_REDIS_PASSWORD:-change-this-dokploy-redis-password}@redis:6379
    volumes:
      - dokploy_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    mem_limit: 1g
    cpus: 1.0

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dokploy
      POSTGRES_USER: dokploy
      POSTGRES_PASSWORD: ${DOKPLOY_DB_PASSWORD:-change-this-dokploy-db-password}
    volumes:
      - dokploy_postgres:/var/lib/postgresql/data
    mem_limit: 512m
    cpus: 0.5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${DOKPLOY_REDIS_PASSWORD:-change-this-dokploy-redis-password}
    volumes:
      - dokploy_redis:/data
    mem_limit: 256m
    cpus: 0.25

volumes:
  dokploy_data:
  dokploy_postgres:
  dokploy_redis:
