services:
  coolify:
    image: ghcr.io/coollabsio/coolify:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - realtime
    ports:
      - "8000:8000"
    environment:
      APP_ID: ${COOLIFY_APP_ID:-coolify}
      APP_KEY: ${COOLIFY_APP_KEY:-base64:change-this-coolify-app-key}
      APP_URL: ${COOLIFY_APP_URL:-http://localhost:8000}
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: coolify
      DB_USERNAME: coolify
      DB_PASSWORD: ${COOLIFY_DB_PASSWORD:-change-this-coolify-db-password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${COOLIFY_REDIS_PASSWORD:-change-this-coolify-redis-password}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      PUSHER_APP_ID: ${COOLIFY_PUSHER_APP_ID:-coolify}
      PUSHER_APP_KEY: ${COOLIFY_PUSHER_APP_KEY:-coolify}
      PUSHER_APP_SECRET: ${COOLIFY_PUSHER_APP_SECRET:-change-this-coolify-pusher-secret}
      PUSHER_HOST: ${COOLIFY_PUSHER_HOST:-localhost}
      PUSHER_PORT: ${COOLIFY_PUSHER_PORT:-6001}
      PUSHER_SCHEME: http
      SELF_HOSTED: "true"
      SSL_MODE: off
    volumes:
      - coolify_data:/var/www/html/storage
      - /var/run/docker.sock:/var/run/docker.sock
    mem_limit: 1g
    cpus: 1.0

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: coolify
      POSTGRES_USER: coolify
      POSTGRES_PASSWORD: ${COOLIFY_DB_PASSWORD:-change-this-coolify-db-password}
    volumes:
      - coolify_postgres:/var/lib/postgresql/data
    mem_limit: 512m
    cpus: 0.5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${COOLIFY_REDIS_PASSWORD:-change-this-coolify-redis-password}
    volumes:
      - coolify_redis:/data
    mem_limit: 256m
    cpus: 0.25

  realtime:
    image: quay.io/soketi/soketi:1.6-16-alpine
    restart: unless-stopped
    ports:
      - "6001:6001"
    environment:
      SOKETI_DEFAULT_APP_ID: ${COOLIFY_PUSHER_APP_ID:-coolify}
      SOKETI_DEFAULT_APP_KEY: ${COOLIFY_PUSHER_APP_KEY:-coolify}
      SOKETI_DEFAULT_APP_SECRET: ${COOLIFY_PUSHER_APP_SECRET:-change-this-coolify-pusher-secret}
    mem_limit: 256m
    cpus: 0.25

volumes:
  coolify_data:
  coolify_postgres:
  coolify_redis:
