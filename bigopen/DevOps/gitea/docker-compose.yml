services:
  gitea:
    image: docker.gitea.com/gitea:1.25.4
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "3005:3000"
      - "222:22"
    environment:
      USER_UID: ${GITEA_USER_UID:-1000}
      USER_GID: ${GITEA_USER_GID:-1000}
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD:-change-this-gitea-db-password}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-http://localhost:3005/}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-222}
    volumes:
      - gitea_data:/data
    mem_limit: 768m
    cpus: 0.75

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD:-change-this-gitea-db-password}
    volumes:
      - gitea_postgres:/var/lib/postgresql/data
    mem_limit: 512m
    cpus: 0.5

volumes:
  gitea_data:
  gitea_postgres:
