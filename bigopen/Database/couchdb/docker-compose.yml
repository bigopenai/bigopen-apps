version: '3.9'

services:
  couchdb:
    image: couchdb:3
    container_name: couchdb
    ports:
      - '5984:5984'
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=admin123
    volumes:
      - couchdb_data:/opt/couchdb/data
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

volumes:
  couchdb_data:
