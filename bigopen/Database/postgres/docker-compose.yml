services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${bigopen-db}
      POSTGRES_USER: ${admin}
      POSTGRES_PASSWORD: ${password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    cpus: 0.5

volumes:
  postgres_data:

