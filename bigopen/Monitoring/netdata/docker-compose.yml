services:
  netdata:
    image: netdata/netdata:stable
    restart: unless-stopped
    ports:
      - "19999:19999"
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
    mem_limit: 512m
    cpus: 0.5

volumes:
  netdata_config:
  netdata_lib:
  netdata_cache:

