services:
  appwrite:
    image: appwrite/appwrite:1.6.0
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    ports:
      - "8087:80"
    environment:
      _APP_ENV: production
      _APP_OPENSSL_KEY_V1: ${APPWRITE_OPENSSL_KEY:-change-this-appwrite-key}
      _APP_DOMAIN: ${APPWRITE_DOMAIN:-localhost}
      _APP_DOMAIN_TARGET: ${APPWRITE_DOMAIN_TARGET:-localhost}
      _APP_DOMAIN_FUNCTIONS: ${APPWRITE_DOMAIN_FUNCTIONS:-localhost}
      _APP_CONSOLE_WHITELIST_ROOT: enabled
      _APP_OPTIONS_FORCE_HTTPS: disabled
      _APP_USAGE_STATS: disabled
      _APP_DB_HOST: mariadb
      _APP_DB_PORT: 3306
      _APP_DB_SCHEMA: appwrite
      _APP_DB_USER: appwrite
      _APP_DB_PASS: ${APPWRITE_DB_PASSWORD:-change-this-appwrite-db-password}
      _APP_REDIS_HOST: redis
      _APP_REDIS_PORT: 6379
    volumes:
      - appwrite_uploads:/storage/uploads
      - appwrite_cache:/storage/cache
      - appwrite_config:/storage/config
      - appwrite_certificates:/storage/certificates
    mem_limit: 1g
    cpus: 1.0

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${APPWRITE_DB_ROOT_PASSWORD:-change-this-root-password}
      MARIADB_DATABASE: appwrite
      MARIADB_USER: appwrite
      MARIADB_PASSWORD: ${APPWRITE_DB_PASSWORD:-change-this-appwrite-db-password}
    volumes:
      - appwrite_mariadb:/var/lib/mysql
    mem_limit: 512m
    cpus: 0.5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - appwrite_redis:/data
    mem_limit: 256m
    cpus: 0.25

volumes:
  appwrite_uploads:
  appwrite_cache:
  appwrite_config:
  appwrite_certificates:
  appwrite_mariadb:
  appwrite_redis:

