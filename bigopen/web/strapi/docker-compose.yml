services:
  strapi:
    image: strapi/strapi:latest
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: .tmp/data.db
      JWT_SECRET: ${STRAPI_JWT_SECRET:-change-this-strapi-jwt-secret}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:-change-this-strapi-admin-secret}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT:-change-this-strapi-token-salt}
      APP_KEYS: ${STRAPI_APP_KEYS:-key1,key2,key3,key4}
    command: >
      sh -c "if [ ! -f package.json ]; then
      strapi new . --quickstart --no-run;
      fi && strapi start"
    volumes:
      - strapi_data:/srv/app
    mem_limit: 768m
    cpus: 0.75

volumes:
  strapi_data:

