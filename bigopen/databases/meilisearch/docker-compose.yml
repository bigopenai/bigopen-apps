services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-this-meilisearch-key}
    volumes:
      - meilisearch_data:/meili_data
    mem_limit: 512m
    cpus: 0.5

volumes:
  meilisearch_data:

